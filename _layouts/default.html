<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Okalai AI — Multilingual AI Research</title>
  <meta name="description" content="Okalai AI is an independent research institute building language technology for the world's underserved languages." />
  <meta name="keywords" content="multilingual AI, low-resource languages, NLP, natural language processing, African languages, language technology, multilingual LLM, machine translation, underserved languages, AI research, computational linguistics, Okalai" />
  <meta name="robots" content="index, follow" />
  <!-- Open Graph -->
  <meta property="og:title" content="Okalai AI — Building AI for every language" />
  <meta property="og:description" content="Independent research institute developing multilingual LLMs, datasets, and tools for underserved languages." />
  <meta property="og:image" content="https://okalai.org/assets/images/okalai-hero2.png" />
  <meta property="og:url" content="https://okalai.org" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Okalai AI — Building AI for every language" />
  <meta name="twitter:description" content="Independent research institute developing multilingual LLMs, datasets, and tools for underserved languages." />
  <meta name="twitter:image" content="https://okalai.org/assets/images/okalai-hero2.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ResearchOrganization",
    "name": "Okalai AI",
    "url": "https://okalai.org",
    "logo": "https://okalai.org/assets/images/favicon.png",
    "description": "Research institute building language technology for the world's underserved languages, including the first family of Kwanyama LLMs.",
    "sameAs": [
      "https://github.com/okalai-ai",
      "https://huggingface.co/okalai-ai"
    ],
    "founder": {
      "@type": "Person",
      "name": "Ndapa Nakashole",
      "url": "https://ndapa.us"
    }
  }
  </script>

  <!-- Preload hero image -->
  <link rel="preload" href="/assets/images/okalai-hero.jpg" as="image" />

  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="canonical" href="https://okalai.org{{ page.url }}" />
  <link rel="alternate" hreflang="en" href="https://okalai.org{{ page.url }}" />
  <link rel="alternate" hreflang="x-default" href="https://okalai.org{{ page.url }}" />

  <link rel="icon" href="/assets/images/favicon.png" type="image/png" />
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <link rel="alternate" type="application/atom+xml" title="Okalai AI Feed" href="/feed.xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WYRCSGSXRP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WYRCSGSXRP');
  </script>

  <script src="https://unpkg.com/scrollreveal"></script>
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="/" class="logo">Okalai<span class="logo-dot">.</span></a>
      <nav>
        <ul class="nav-links">
          <li><a href="#news">News</a></li>
          <li><a href="#research">Research</a></li>
          <li><a href="#products">Products</a></li>
          <li><a href="https://github.com/okalai-ai" target="_blank" rel="noopener">GitHub</a></li>
        </ul>
        <button class="mobile-menu-btn" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <!-- Floating feedback link -->
  <a href="mailto:feedback@okalai.org?subject=Okalai%20Feedback" class="floating-feedback" title="Send feedback">Feedback</a>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <span class="footer-logo">Okalai<span class="logo-dot">.</span></span>
        <p>AI research institute.</p>
        <div class="newsletter-signup">
          <p class="newsletter-label">Stay updated</p>
          <form action="https://okalai.us21.list-manage.com/subscribe/post" method="POST" class="newsletter-form" id="newsletter-form">
            <input type="email" name="EMAIL" placeholder="your@email.com" required class="newsletter-input" />
            <button type="submit" class="btn btn-primary newsletter-btn">Subscribe</button>
          </form>
        </div>
      </div>
      <div class="footer-links">
        <a href="https://github.com/okalai-ai" target="_blank" rel="noopener">GitHub</a>
        <a href="https://huggingface.co/okalai-ai" target="_blank" rel="noopener">Hugging Face</a>
        <a href="/feed.xml" title="RSS Feed">RSS</a>
      </div>
      <div class="footer-right">
        <p>&copy; <span id="year"></span> Okalai AI</p>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        // Close mobile menu if open
        document.querySelector('.nav-links').classList.remove('open');
        document.querySelector('.mobile-menu-btn').classList.remove('open');
      });
    });

    // Mobile menu toggle
    const menuBtn = document.querySelector('.mobile-menu-btn');
    const navLinks = document.querySelector('.nav-links');
    if (menuBtn) {
      menuBtn.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        menuBtn.classList.toggle('open');
      });
    }

    // ScrollReveal
    ScrollReveal().reveal('[data-sr]', {
      interval: 120,
      distance: '30px',
      origin: 'bottom',
      duration: 600,
      easing: 'ease-out'
    });

    // Animate stat numbers on scroll
    const animateStats = () => {
      document.querySelectorAll('.stat-number').forEach(el => {
        const target = parseInt(el.dataset.target);
        if (!target || el.dataset.animated) return;

        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > 0) {
          el.dataset.animated = 'true';
          let current = 0;
          const step = Math.ceil(target / 60);
          const timer = setInterval(() => {
            current += step;
            if (current >= target) {
              current = target;
              clearInterval(timer);
            }
            el.textContent = current.toLocaleString();
          }, 20);
        }
      });
    };
    window.addEventListener('scroll', animateStats);
    animateStats();

    // Okalex live search widget
    const searchInput = document.getElementById('okalex-search');
    const resultsDiv = document.getElementById('okalex-results');
    const toggleBtns = document.querySelectorAll('.toggle-btn');
    let searchLang = 'en';
    let debounceTimer;

    if (toggleBtns.length) {
      toggleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          toggleBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          searchLang = btn.dataset.lang;
          if (searchInput.value.trim()) searchInput.dispatchEvent(new Event('input'));
        });
      });
    }

    if (searchInput) {
      searchInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const query = searchInput.value.trim();
        if (!query) {
          resultsDiv.innerHTML = '';
          return;
        }
        debounceTimer = setTimeout(() => {
          const param = searchLang === 'en' ? 'q_en' : 'q_kw';
          fetch(`https://okalex.org/api/entries?page=1&limit=4&${param}=${encodeURIComponent(query)}`)
            .then(r => r.json())
            .then(data => {
              const entries = Array.isArray(data) ? data : (data.entries || data.results || []);
              if (!entries.length) {
                resultsDiv.innerHTML = '<p class="try-it-empty">No results found. Try another word.</p>';
                return;
              }
              resultsDiv.innerHTML = entries.slice(0, 4).map(e => {
                const word = e.english || '';
                const kw = e.kwanyama || '';
                const pos = e.pos || '';
                const def = e.definition || '';
                const viewerUrl = `https://okalex.org/viewer.html?word=${encodeURIComponent(word)}`;
                return `<a href="${viewerUrl}" target="_blank" rel="noopener" class="try-it-entry">
                  <span class="try-it-word">${word}${kw ? ' &mdash; <em>' + kw + '</em>' : ''}</span>
                  ${pos ? '<span class="try-it-pos">' + pos + '</span>' : ''}
                  ${def ? '<span class="try-it-def">' + def.slice(0, 120) + (def.length > 120 ? '...' : '') + '</span>' : ''}
                </a>`;
              }).join('') + `<a href="https://okalex.org/viewer.html?word=${encodeURIComponent(searchInput.value.trim())}" target="_blank" rel="noopener" class="try-it-more">See all results on Okalex &rarr;</a>`;
            })
            .catch(() => {
              resultsDiv.innerHTML = '<p class="try-it-empty">Could not connect to Okalex.</p>';
            });
        }, 500);
      });
    }

    // OkaLM live generation widget
    const okalInput = document.getElementById('okalm-input');
    const okalBtn = document.getElementById('okalm-generate');
    const okalResults = document.getElementById('okalm-results');

    if (okalBtn && okalInput) {
      async function generateText() {
        const prompt = okalInput.value.trim();
        if (!prompt) return;

        okalBtn.disabled = true;
        okalBtn.textContent = 'Generating...';
        okalResults.innerHTML = '<p class="try-it-empty">Generating text with OkaLM-8B...</p>';

        try {
          const response = await fetch('https://api-inference.huggingface.co/models/okalai-ai/okalm-8b', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              inputs: prompt,
              parameters: {
                max_new_tokens: 100,
                temperature: 0.7,
                return_full_text: true
              }
            })
          });

          if (response.status === 503) {
            const data = await response.json();
            okalResults.innerHTML = '<p class="try-it-empty">Model is loading, please try again in a few seconds...</p>';
          } else if (!response.ok) {
            throw new Error('API error');
          } else {
            const data = await response.json();
            const text = Array.isArray(data) ? data[0].generated_text : data.generated_text || '';
            okalResults.innerHTML = `<div class="try-it-entry">
              <span class="try-it-def" style="white-space: pre-wrap; font-size: 1rem; line-height: 1.7;">${text}</span>
            </div>`;
          }
        } catch (e) {
          okalResults.innerHTML = '<p class="try-it-empty">Could not connect to the model. Please try again later.</p>';
        }

        okalBtn.disabled = false;
        okalBtn.textContent = 'Generate';
      }

      okalBtn.addEventListener('click', generateText);
      okalInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') generateText();
      });
    }
  </script>
</body>
</html>
